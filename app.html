const STYLES = `
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0b;
  --surface: #111113;
  --surface2: #18181b;
  --surface3: #222226;
  --border: #2a2a30;
  --border2: #3a3a42;
  --text: #e8e8ec;
  --text2: #9090a0;
  --text3: #55556a;
  --accent: #4fc3a1;
  --accent2: #2a7a64;
  --warn: #e8a44a;
  --danger: #e85a4a;
  --mission: #7a8fe8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

html, body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }

#root { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

.header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; background: var(--bg);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo { width: 30px; height: 30px; border-radius: 5px; object-fit: cover; }
.header-title { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; }
.header-day { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }
.er-badge {
  font-size: 10px; font-weight: 500; padding: 3px 8px;
  border: 1px solid var(--border2); border-radius: 2px;
  color: var(--accent); background: var(--surface2);
  cursor: pointer; letter-spacing: 0.08em; font-family: var(--mono);
}

.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
.tab {
  flex: 1; padding: 10px 0; font-size: 10px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; text-align: center;
  cursor: pointer; color: var(--text3); border: none; background: none;
  border-bottom: 2px solid transparent; transition: all 0.15s;
  font-family: var(--mono);
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text2); }

.main { flex: 1; overflow-y: auto; padding: 0 0 120px; }

.capture-zone { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.capture-input {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 10px 12px; color: var(--text);
  font-family: var(--mono); font-size: 13px; resize: none;
  min-height: 60px; line-height: 1.5; outline: none;
  transition: border-color 0.15s;
}
.capture-input:focus { border-color: var(--border2); }
.capture-input::placeholder { color: var(--text3); }

.capture-btns { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.btn {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 10px; border-radius: 2px; cursor: pointer;
  border: 1px solid; transition: all 0.12s;
}
.btn-raw { color: var(--text2); border-color: var(--border2); background: var(--surface2); }

function now() { return new Date(); }
function ts(d) {
  d = d || now();
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}
function dateStr(d) {
  d = d || now();
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function isoDay(d) {
  d = d || now();
  return d.toISOString().split('T')[0];
}

function loadState() {
  try {
    const raw = localStorage.getItem('spex_v4');
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}
function saveState(state) {
  try { localStorage.setItem('spex_v4', JSON.stringify(state)); } catch {}
}

const DEFAULT_MISSIONS = [
  { id: 1, name: 'App Build', status: 'Ongoing' },

function SpexV4() {
  const stored = loadState();
  const [entries, setEntries] = useState(stored?.entries || []);
  const [missions, setMissions] = useState(stored?.missions || DEFAULT_MISSIONS);
  const [nightlies, setNightlies] = useState(stored?.nightlies || []);
  const [currentER, setCurrentER] = useState(stored?.currentER || '');
  const [openMoment, setOpenMoment] = useState(stored?.openMoment || null);
  const [tab, setTab] = useState('capture');
  const [captureText, setCaptureText] = useState('');
  const [showERModal, setShowERModal] = useState(false);
  const [erInput, setErInput] = useState('');
  const [showMomentModal, setShowMomentModal] = useState(false);
  const [momentName, setMomentName] = useState('');
  const [momentType, setMomentType] = useState('temporal');
  const [nightlyOutput, setNightlyOutput] = useState('');
  const [nightlyStatus, setNightlyStatus] = useState('');
  const [nightlyLoading, setNightlyLoading] = useState(false);
  const [compileMode, setCompileMode] = useState('draft');
  const [rehydType, setRehydType] = useState('rehydration');
  const [rehydOutput, setRehydOutput] = useState('');
  const [newMissionName, setNewMissionName] = useState('');
  const [copyFlash, setCopyFlash] = useState('');

  useEffect(() => {
    saveState({ entries, missions, nightlies, currentER, openMoment, currentDay: isoDay() });
  }, [entries, missions, nightlies, currentER, openMoment]);

  const today = isoDay();

  function addEntry(type, text, extra) {
    extra = extra || {};
    if (!text.trim()) return;
    const e = Object.assign({ id: Date.now(), type, text: text.trim(), time: ts(), iso: new Date().toISOString() }, extra);
    setEntries(prev => [e, ...prev]);
    setCaptureText('');
  }

  function deleteEntry(id) { setEntries(prev => prev.filter(e => e.id !== id)); }

  function handleRaw() { addEntry('raw', captureText); }
  function handleMilestone() {
    if (!captureText.trim()) return;
    addEntry('milestone', "Milestone: " + captureText + " — Met");
  }
  function handleMarker() {
    if (!captureText.trim()) return;
    addEntry('marker', "Marker: " + captureText + " — Logged");
  }
  function handleOpenMoment() {
    if (!captureText.trim()) { setShowMomentModal(true); return; }
    const name = captureText.trim();
    const entry = { id: Date.now(), type: 'moment', text: "Moment: " + name + " — Loop Open", time: ts(), iso: new Date().toISOString() };
    setEntries(prev => [entry, ...prev]);
    setOpenMoment({ name, openedAt: ts() });
    setCaptureText('');
  }
  function handleCloseMoment() {
    if (!openMoment) return;
    addEntry('moment', "Moment: " + openMoment.name + " — Loop Closed");
    setOpenMoment(null);
  }
  function handleMissionCapture() {
    if (!captureText.trim()) return;
    addEntry('mission', captureText.trim());
  }
  function handleERSubmit() {
    if (!erInput.trim()) { setShowERModal(false); return; }
    setCurrentER(erInput.trim());
    addEntry('er', "ER: " + erInput.trim());
    setErInput('');
    setShowERModal(false);
  }
  function handleMomentModalSubmit() {
    if (!momentName.trim()) { setShowMomentModal(false); return; }
    const entry = { id: Date.now(), type: 'moment', text: "Moment: " + momentName + " — Loop Open", time: ts(), iso: new Date().toISOString() };
    setEntries(prev => [entry, ...prev]);
    setOpenMoment({ name: momentName, openedAt: ts(), type: momentType });
    setMomentName('');
    setShowMomentModal(false);
  }

  function addMission() {
    if (!newMissionName.trim()) return;
    setMissions(prev => [...prev, { id: Date.now(), name: newMissionName.trim(), status: 'Launched' }]);
    setNewMissionName('');
  }
  function cycleMissionStatus(id) {
    const cycle = ['Launched', 'Ongoing', 'Paused', 'Completed'];
    setMissions(prev => prev.map(m => m.id === id ? Object.assign({}, m, { status: cycle[(cycle.indexOf(m.status) + 1) % cycle.length] }) : m));
  }
  function deleteMission(id) { setMissions(prev => prev.filter(m => m.id !== id)); }

  async function runNightlyCompile() {
    const todayEntries = entries.filter(e => e.iso && e.iso.startsWith(today));
    if (!todayEntries.length) { setNightlyStatus('No entries for today.'); return; }

    setNightlyLoading(true);
    setNightlyStatus('Compiling ' + compileMode + '...');

    const rawList = [...todayEntries].reverse().map(e => "[" + e.time + "] [" + e.type.toUpperCase() + "] " + e.text).join("\n");
    const missionStr = missions.map(m => m.name + ": " + m.status).join(', ');

    let systemPrompt;

    if (compileMode === 'draft') {
      systemPrompt = "You are a Nightly Compile Engine for the LUX Layer Stack TRS.\n\nYour output is a DRAFT — a tight structural reconstruction that LUX will refine into the final Nightly Report.\n\nTRS is a RECONSTRUCTION DEVICE. Apply the 6-pass Nightly Compile Logic to every raw capture: promote / merge / support-detail / drop. Most raw captures should be dropped or merged. Only load-bearing signal survives.\n\nSELECTION CRITERION — keep only what:\n- Changed the day's structure\n- Opened or closed a meaningful loop\n- Altered ERI/regulation meaningfully\n- Carried relational, practical, or mission significance\n- Would matter in 10-day synthesis\n\nDROP: passing intentions, failed attempts without consequence, noise, redundant captures.\n\nOUTPUT FORMAT — 5 SECTIONS, TIGHT:\n\n1. Day Spine (one line: arc description)\n2. TRS Structural Log (Milestones, Moments, Sub-Loops — formal notation only)\n3. Markers (only load-bearing)\n4. ERI Trend (start → peak → close, one line)\n5. Closing Line (one sentence)\n\nNO prose expansion. NO pattern recognition essays. NO mission commentary unless materially touched. NO symbolism, narrative inflation, or psychological interpretation.\n\nThis draft feeds LUX. LUX produces the polished Nightly.";
    } else {
      systemPrompt = "You are a Nightly Compile Engine for the LUX Layer Stack TRS.\n\nYour output is a POLISHED standalone Nightly Report.\n\nTRS is a RECONSTRUCTION DEVICE. Apply the 6-pass Nightly Compile Logic to every raw capture: promote / merge / support-detail / drop. Only load-bearing signal survives.\n\nSELECTION CRITERION — keep only what:\n- Changed the day's structure\n- Opened or closed a meaningful loop\n- Altered ERI/regulation meaningfully\n- Carried relational, practical, or mission significance\n- Would matter in 10-day synthesis\n\nDROP: passing intentions, noise, redundant captures.\n\nOUTPUT FORMAT — 8 SECTIONS:\n\n1. Day Container (type + core arc)\n2. TRS Structural Log (Milestones / Moments / Sub-Loops — formal notation)\n3. Key Markers (load-bearing only)\n4. ERI Arc (if ER data present)\n5. Pattern Recognition (brief — 1-2 patterns max)\n6. Mission Layer (only materially touched missions)\n7. Open Loops / Carryover\n8. Closing Assessment (2-3 sentences)\n\nTRS SYNTAX:\n- Milestone: [Name] — Met\n- Moment: [Name] — Loop Open/Closed\n- Marker: [Event] — Logged\n- Mission: [Name] — [Status]\n\nKeep it tight. Elegance over completeness. No symbolism, no narrative inflation, no psychological interpretation. Only structure.";
    }

    const userPrompt = "Today: " + dateStr() + "\nActive Missions: " + missionStr + "\nCurrent ERI/CA: " + (currentER || 'not logged') + "\nOpen Moment: " + (openMoment ? openMoment.name : 'none') + "\n\nRAW CAPTURES + FORMAL LOGS (chronological):\n\n" + rawList + "\n\nCompile the Nightly " + (compileMode === 'draft' ? 'DRAFT (tight, 5 sections)' : 'POLISHED REPORT (full 8 sections)') + " now.";

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });
      const data = await res.json();
      const text = data.content?.map(c => c.text || '').join('') || 'Compile failed.';
      setNightlyOutput(text);
      setNightlyStatus('Auto-compile complete (' + compileMode + '). Edit as needed, then save.');
    } catch (err) {
      setNightlyStatus('API error — write manually below.');
      setNightlyOutput("🌙 Nightly " + (compileMode === 'draft' ? 'DRAFT' : 'Report') + " — " + dateStr() + "\n\n[compile manually]");
    }
    setNightlyLoading(false);
  }

  function saveNightly() {
    if (!nightlyOutput.trim()) return;
    const newNightly = { id: Date.now(), date: dateStr(), dayKey: today, content: nightlyOutput };
    setNightlies(prev => [newNightly, ...prev.filter(n => n.dayKey !== today)]);
    setNightlyStatus('Saved — ' + dateStr());
  }

  function generateRehydration() {
    const activeMissions = missions.filter(m => m.status !== 'Completed');
    let out;
    if (rehydType === 'hydration') {
      out = buildHydrationPrompt(dateStr(), ts(), nightlies, '', activeMissions, currentER);
    } else {
      out = buildRehydrationPrompt(dateStr(), ts(), nightlies, activeMissions, currentER, openMoment);
    }
    setRehydOutput(out);
  }

  function copyToClipboard(text, key) {
    navigator.clipboard.writeText(text).then(() => {
      setCopyFlash(key);
      setTimeout(() => setCopyFlash(''), 1200);
    });
  }

  function dotClass(type) {
    const map = { raw: 'dot-raw', milestone: 'dot-milestone', moment: 'dot-moment', marker: 'dot-marker', mission: 'dot-mission', er: 'dot-er' };
    return map[type] || 'dot-raw';
  }
  function typeLabel(type) {
    const map = { raw: 'Raw', milestone: 'Milestone', moment: 'Moment', marker: 'Marker', mission: 'Mission', er: 'ERI' };
    return map[type] || type;
  }

  const todayEntries = entries.filter(e => e.iso && e.iso.startsWith(today));
  const olderEntries = entries.filter(e => !e.iso || !e.iso.startsWith(today));

  return (
    <React.Fragment>
      <style>{STYLES}</style>

      <div className="header">
        <div className="header-left">
          <img src={LOGO_B64} alt="LUX Logo" className="header-logo" />
          <div>
            <div className="header-title">Spex v4</div>
            <div className="header-day">{dateStr()}</div>
          </div>
        </div>
        <button className="er-badge" onClick={() => { setErInput(currentER); setShowERModal(true); }}>
          {currentER ? "ERI " + currentER : 'Log ERI'}
        </button>
      </div>

      <div className="tabs">
        {['capture', 'missions', 'nightly', 'rehydrate'].map(t => (
          <button key={t} className={"tab" + (tab === t ? ' active' : '')} onClick={() => setTab(t)}>
            {t === 'nightly' ? 'Night' : t === 'rehydrate' ? 'Rehydrate' : t}
          </button>
        ))}
      </div>

      <div className="main">
        {tab === 'capture' && (
          <React.Fragment>
            <div className="capture-zone">
              <textarea
                className="capture-input"
                placeholder="raw capture / formal log..."
                value={captureText}
                onChange={e => setCaptureText(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && e.metaKey) handleRaw(); }}
              />
              <div className="capture-btns">
                <button className="btn btn-raw" onClick={handleRaw}>Raw ↵</button>
                <button className="btn btn-milestone" onClick={handleMilestone}>Milestone</button>
                {openMoment
                  ? <button className="btn btn-moment" style={{borderStyle:'dashed'}} onClick={handleCloseMoment}>Close Moment</button>
                  : <button className="btn btn-moment" onClick={handleOpenMoment}>Open Moment</button>
                }
                <button className="btn btn-marker" onClick={handleMarker}>Marker</button>
                <button className="btn btn-mission" onClick={handleMissionCapture}>Mission</button>
              </div>
            </div>

            {openMoment && (
              <div className="moment-banner">
                <span className="moment-banner-text">◉ {openMoment.name} — Open since {openMoment.openedAt}</span>
                <button className="moment-close-btn" onClick={handleCloseMoment}>Close Loop</button>
              </div>
            )}

            <div className="feed">
              {todayEntries.length === 0 && (
                <div className="feed-empty">No captures yet today.<br />Start logging.</div>
              )}
              {todayEntries.length > 0 && (
                <React.Fragment>
                  <div className="section-label"><span>Today</span><span>{todayEntries.length} entries</span></div>
                  {todayEntries.map(e => (
                    <div key={e.id} className="entry">
                      <div className={"entry-type-dot " + dotClass(e.type)} />
                      <div className="entry-body">
                        <div className="entry-label">{typeLabel(e.type)}</div>
                        <div className="entry-text">{e.text}</div>
                        <div className="entry-time">{e.time}</div>
                      </div>
                      <span className="entry-delete" onClick={() => deleteEntry(e.id)}>✕</span>
                    </div>
                  ))}
                </React.Fragment>
              )}
              {olderEntries.length > 0 && (
                <React.Fragment>
                  <div className="section-label"><span>Earlier</span><span>{olderEntries.length}</span></div>
                  {olderEntries.slice(0, 20).map(e => (
                    <div key={e.id} className="entry" style={{ opacity: 0.5 }}>
                      <div className={"entry-type-dot " + dotClass(e.type)} />
                      <div className="entry-body">
                        <div className="entry-label">{typeLabel(e.type)}</div>
                        <div className="entry-text">{e.text}</div>
                        <div className="entry-time">{e.time}</div>
                      </div>
                      <span className="entry-delete" onClick={() => deleteEntry(e.id)}>✕</span>
                    </div>
                  ))}
                </React.Fragment>
              )}
            </div>
          </React.Fragment>
        )}

        {tab === 'missions' && (
          <React.Fragment>
            <div className="section-label">
              <span>Active Missions</span>
              <span>{missions.filter(m => m.status !== 'Completed').length} active</span>
            </div>
            <div className="mission-list">
              {missions.map(m => (
                <div key={m.id} className="mission-item">
                  <span className="mission-name">{m.name}</span>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    <span
                      className={"mission-status status-" + m.status.toLowerCase()}
                      onClick={() => cycleMissionStatus(m.id)}
                      style={{ cursor: 'pointer' }}
                      title="Tap to cycle status"
                    >
                      {m.status}
                    </span>
                    <span className="entry-delete" style={{ opacity: 1 }} onClick={() => deleteMission(m.id)}>✕</span>
                  </div>
                </div>
              ))}
              <div className="mission-add">
                <input
                  className="mission-input"
                  placeholder="New mission name..."
                  value={newMissionName}
                  onChange={e => setNewMissionName(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') addMission(); }}
                />
                <button className="btn btn-mission" onClick={addMission}>Add</button>
              </div>
            </div>
          </React.Fragment>
        )}

        {tab === 'nightly' && (
          <React.Fragment>
            <div className="nightly-zone">
              <div className="mode-toggle">
                <button
                  className={"mode-btn" + (compileMode === 'draft' ? ' selected' : '')}
                  onClick={() => setCompileMode('draft')}
                >Draft (for LUX)</button>
                <button
                  className={"mode-btn" + (compileMode === 'polished' ? ' selected' : '')}
                  onClick={() => setCompileMode('polished')}
                >Polished (standalone)</button>
              </div>
              <div className="capture-btns" style={{ marginBottom: 10 }}>
                <button className="btn btn-primary" onClick={runNightlyCompile} disabled={nightlyLoading}>
                  {nightlyLoading ? 'Compiling...' : '⟳ Generate Nightly'}
                </button>
                <button className="btn btn-ghost" onClick={() => {
                  const tmpl = compileMode === 'draft'
                    ? "🌙 Nightly DRAFT — " + dateStr() + "\n\n1. Day Spine:\n\n2. TRS Structural Log:\n\nMilestone: [name] — Met\nMoment: [name] — Loop Closed\n\n3. Markers (load-bearing):\n\n4. ERI Trend (start → peak → close):\n\n5. Closing Line:"
                    : "🌙 Nightly Report — " + dateStr() + "\n\n1. Day Container:\n\n2. TRS Structural Log:\n\n3. Key Markers:\n\n4. ERI Arc:\n\n5. Pattern Recognition:\n\n6. Mission Layer:\n\n7. Open Loops:\n\n8. Closing Assessment:";
                  setNightlyOutput(tmpl);
                  setNightlyStatus('Template loaded. Edit manually.');
                }}>Template</button>
              </div>
              <div className={"nightly-status" + (nightlyLoading ? ' nightly-loading' : '')}>
                {nightlyLoading ? 'Running compile passes...' : nightlyStatus}
              </div>
              <textarea
                className="nightly-output"
                value={nightlyOutput}
                onChange={e => setNightlyOutput(e.target.value)}
                placeholder="Nightly will appear here after compile..."
                style={{ marginTop: 8 }}
              />
              <div className="nightly-actions">
                <button className="btn btn-primary" onClick={saveNightly}>Save Nightly</button>
                <button
                  className={"btn btn-ghost" + (copyFlash === 'nightly' ? ' copy-flash' : '')}
                  onClick={() => copyToClipboard(nightlyOutput, 'nightly')}
                >
                  {copyFlash === 'nightly' ? 'Copied!' : 'Copy'}
                </button>
              </div>
            </div>

            {nightlies.length > 0 && (
              <React.Fragment>
                <div className="section-label">
                  <span>Saved Nightlies</span>
                  <span>{nightlies.length}</span>
                </div>
                <div className="nightly-saved-list">
                  {nightlies.map(n => (
                    <div key={n.id} className="nightly-saved-item" onClick={() => {
                      setNightlyOutput(n.content);
                      setNightlyStatus("Loaded: " + n.date);
                    }}>
                      <div className="nightly-saved-date">{n.date}</div>
                      <div className="nightly-saved-preview">{n.content.slice(0, 80)}...</div>
                    </div>
                  ))}
                </div>
              </React.Fragment>
            )}
          </React.Fragment>
        )}

        {tab === 'rehydrate' && (
          <div className="rehydration-zone">
            <div className="mode-toggle">
              <button
                className={"mode-btn" + (rehydType === 'hydration' ? ' selected' : '')}
                onClick={() => setRehydType('hydration')}
              >Hydration (New Thread)</button>
              <button
                className={"mode-btn" + (rehydType === 'rehydration' ? ' selected' : '')}
                onClick={() => setRehydType('rehydration')}
              >Rehydration (Same Thread)</button>
            </div>
            <div className="capture-btns" style={{ marginBottom: 10 }}>
              <button className="btn btn-primary" onClick={generateRehydration}>Generate Prompt</button>
            </div>
            <textarea
              className="rehydration-output"
              value={rehydOutput}
              onChange={e => setRehydOutput(e.target.value)}
              placeholder="Generate prompt, then copy to target node..."
            />
            <div className="nightly-actions" style={{ marginTop: 10 }}>
              <button
                className={"btn btn-primary" + (copyFlash === 'rehydrate' ? ' copy-flash' : '')}
                onClick={() => copyToClipboard(rehydOutput, 'rehydrate')}
              >
                {copyFlash === 'rehydrate' ? 'Copied!' : 'Copy Prompt'}
              </button>
            </div>
            <div className="info-line">
              {rehydType === 'hydration'
                ? 'Hydration = full CES stack + all recent Nightlies + Decas. Use for cold starts in new threads.'
                : 'Rehydration = lighter CES reminder + current state only. Use inside an already-running thread.'}
            </div>
            <div className="info-line">
              Nightlies loaded: {nightlies.length} · Missions: {missions.filter(m => m.status !== 'Completed').length} active · ERI: {currentER || 'not logged'}
            </div>
          </div>
        )}
      </div>

      {showERModal && (
        <div className="modal-overlay" onClick={() => setShowERModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">Log ERI</div>
            <input
              className="modal-input"
              value={erInput}
              onChange={e => setErInput(e.target.value)}
              placeholder="e.g. 1.75B"
              autoFocus
              onKeyDown={e => {
                if (e.key === 'Enter') handleERSubmit();
                if (e.key === 'Escape') setShowERModal(false);
              }}
            />
            <div className="modal-btns">
              <button className="btn btn-ghost" onClick={() => setShowERModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleERSubmit}>Log</button>
            </div>
          </div>
        </div>
      )}

      {showMomentModal && (
        <div className="modal-overlay" onClick={() => setShowMomentModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">Open Moment</div>
            <div className="moment-type-btns">
              <button
                className={"moment-type-btn" + (momentType === 'temporal' ? ' selected' : '')}
                onClick={() => setMomentType('temporal')}
              >Temporal</button>
              <button
                className={"moment-type-btn" + (momentType === 'mission' ? ' selected' : '')}
                onClick={() => setMomentType('mission')}
              >Mission/Event</button>
            </div>
            <input
              className="modal-input"
              value={momentName}
              onChange={e => setMomentName(e.target.value)}
              placeholder="e.g. Morning Sequence"
              autoFocus
              onKeyDown={e => {
                if (e.key === 'Enter') handleMomentModalSubmit();
                if (e.key === 'Escape') setShowMomentModal(false);
              }}
            />
            <div className="modal-btns">
              <button className="btn btn-ghost" onClick={() => setShowMomentModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleMomentModalSubmit}>Open</button>
            </div>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}
